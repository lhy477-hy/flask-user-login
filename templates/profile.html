{% extends "base.html" %}
{% block content %}
<div class="card">
    {% if user %}
        <h2 class="card-title">个人中心</h2>
        <ul class="info-list">
            <li><span class="info-label">用户 ID：</span>{{ user.id }}</li>
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
            <li><span class="info-label">手机：</span>{{ user.phone }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>

        <h3 style="margin: 20px 0 10px; color: #555;">充值</h3>
        <form method="POST" action="/recharge" class="search-form">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="number" name="amount" placeholder="请输入充值金额" step="0.01" required style="flex:1;">
                <button type="submit" class="btn btn-primary">立即充值</button>
            </div>
        </form>

        <div style="margin-top: 20px;">
            <a href="/" class="btn btn-primary">返回首页</a>
        </div>

        <h3 style="margin: 20px 0 10px; color: #555;">修改密码</h3>
        <form method="POST" action="/change-password" class="search-form">
            <input type="hidden" name="username" value="{{ user.username }}">
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="password" name="new_password" placeholder="请输入新密码" required style="flex:1;">
                <button type="submit" class="btn btn-primary">修改密码</button>
            </div>
        </form>
    {% else %}
        <h2 class="card-title">用户不存在</h2>
        <p class="text-muted">请检查 user_id 参数是否正确。</p>
        <a href="/" class="btn btn-primary">返回首页</a>
    {% endif %}
</div>
{% endblock %}
